name: Windows Build

on:
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build NSIS installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust MSVC toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: src-python/requirements-build.txt

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Python sidecar
        shell: pwsh
        run: ./scripts/build-python-sidecar.ps1 -Force

      - name: Smoke test Python sidecar
        shell: pwsh
        run: |
          $Sidecar = Get-ChildItem "src-tauri/binaries/tool-python-*.exe" | Select-Object -First 1
          if ($null -eq $Sidecar) { throw "Windows Sidecar was not generated" }
          $Uuid = (& $Sidecar.FullName uuid_generator 4).Trim()
          if ($LASTEXITCODE -ne 0 -or $Uuid -notmatch "^[0-9a-f-]{36}$") {
            throw "Windows Sidecar smoke test failed: $Uuid"
          }
          Write-Host "Sidecar smoke test passed: $Uuid"

      - name: Check frontend
        run: pnpm build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Build Windows NSIS installer
        run: pnpm tauri build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: tool-collection-windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
